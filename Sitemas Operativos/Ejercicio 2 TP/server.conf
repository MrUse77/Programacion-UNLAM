# Archivo de configuración del servidor (opcional)
# Puede usarse para configurar parámetros sin usar línea de comandos

# Puerto de escucha
PORT=8080

# Máximo de clientes concurrentes
MAX_CLIENTS=5

# Máximo de clientes en cola de espera
MAX_QUEUE=10

# Dirección de escucha (0.0.0.0 para todas las interfaces, 127.0.0.1 para solo local)
LISTEN_ADDRESS=0.0.0.0

# Archivo de base de datos
DATABASE_FILE=database.csv

# Habilitar logs detallados (1=sí, 0=no)
VERBOSE=1
